<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>429 — Забагато запитів · Зоряна Памʼять</title>
<link rel="stylesheet" href="/fonts/uicons/uicons.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#e8e8e8;color:#111;-webkit-font-smoothing:antialiased}
.main{display:flex;align-items:center;justify-content:center;padding:48px;min-height:100vh}
.card{width:100%;max-width:640px;background:#fff;border:1px solid #aaa;box-shadow:0 2px 24px rgba(0,0,0,.1);padding:56px 64px;position:relative;overflow:hidden}
.card::before{content:'ЗОРЯНА ПАМʼЯТЬ';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:44px;font-weight:700;letter-spacing:.2em;color:rgba(0,0,0,.04);pointer-events:none;white-space:nowrap;user-select:none}
.err-icon{font-size:52px;color:#ddd;margin-bottom:16px;display:block;line-height:1}
.err-code{font-size:96px;font-weight:800;color:#111;line-height:1;letter-spacing:-.04em;margin-bottom:8px}
.err-title{font-size:22px;font-weight:600;color:#111;margin-bottom:16px;letter-spacing:-.01em}
.err-desc{font-size:14px;color:#666;line-height:1.7;margin-bottom:32px;max-width:440px}
.err-divider{height:2px;background:#111;width:48px;margin-bottom:32px}
.err-hint{display:inline-flex;align-items:center;gap:8px;background:#f5f5f0;border:1px solid #e0e0d8;border-left:3px solid #111;padding:12px 16px;font-size:12.5px;color:#555;margin-bottom:28px}
.err-hint i{font-size:14px;color:#888;flex-shrink:0}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:#111;color:#fff;text-decoration:none;padding:12px 24px;font-size:13px;font-weight:500;letter-spacing:.04em;transition:background .2s}
.btn-home:hover{background:#333}
.btn-home i{font-size:14px}
@media(max-width:640px){.main{padding:24px}.card{padding:36px 28px}.err-code{font-size:72px}}
</style>
</head>
<body>
<main class="main">
  <div class="card">
    <i class="fi fi-rr-time-delete err-icon"></i>
    <div class="err-code">429</div>
    <div class="err-divider"></div>
    <div class="err-title">Забагато запитів</div>
    <p class="err-desc">Ви надіслали занадто багато запитів за короткий час. Це автоматичний захист сервера від перевантаження.</p>
    <div class="err-hint"><i class="fi fi-rr-clock"></i> Зачекайте кілька хвилин і спробуйте знову</div>
    <a href="/" class="btn-home"><i class="fi fi-rr-arrow-left"></i> На головну</a>
  </div>
</main>
</body>
</html>
