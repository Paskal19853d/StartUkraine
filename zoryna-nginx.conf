# ── Nginx Reverse Proxy для Зоряна Пам'ять ──
# Встановлення: sudo apt install nginx
# Копіювання: sudo cp zoryna-nginx.conf /etc/nginx/sites-available/zoryna
# Активація: sudo ln -s /etc/nginx/sites-available/zoryna /etc/nginx/sites-enabled/
# Перевірка: sudo nginx -t && sudo systemctl reload nginx

upstream zoryna_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # ← Замініть на свій домен

    # ── SSL (розкоментувати після налаштування Let's Encrypt) ──
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # ── Стиснення ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Безпека ──
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Статичні файли ──
    root /var/www/zoryna;
    index index.html;

    location / {
        try_files $uri $uri/ @backend;
    }

    # ── Кешування статичних ассетів ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API ──
    location @backend {
        proxy_pass http://zoryna_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket підтримка (якщо потрібно)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймаути
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Буфери
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Обмеження розміру завантаження ──
    client_max_body_size 10M;
}
