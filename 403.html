<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>403 — Доступ заборонено · Зоряна Памʼять</title>
<link rel="stylesheet" href="/fonts/uicons/uicons.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#e8e8e8;color:#111;-webkit-font-smoothing:antialiased}
.layout{display:flex;min-height:100vh}
.nav{width:240px;min-height:100vh;background:#111;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.3)}
.nav-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-logo-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#00c8ff;line-height:1.4}
.nav-logo-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;margin-top:4px}
.nav-links{padding:20px 0;flex:1}
.nav-link{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,.55);text-decoration:none;font-size:12.5px;transition:color .15s,background .15s;border-left:3px solid transparent}
.nav-link:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.nav-link i{font-size:14px;flex-shrink:0}
.nav-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.2);line-height:1.6}
.main{margin-left:240px;flex:1;display:flex;align-items:center;justify-content:center;padding:48px;min-height:100vh}
.card{width:100%;max-width:640px;background:#fff;border:1px solid #aaa;box-shadow:0 2px 24px rgba(0,0,0,.1);padding:56px 64px;position:relative;overflow:hidden}
.card::before{content:'ЗОРЯНА ПАМʼЯТЬ';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:44px;font-weight:700;letter-spacing:.2em;color:rgba(0,0,0,.04);pointer-events:none;white-space:nowrap;user-select:none}
.err-icon{font-size:52px;color:#ddd;margin-bottom:16px;display:block;line-height:1}
.err-code{font-size:96px;font-weight:800;color:#111;line-height:1;letter-spacing:-.04em;margin-bottom:8px}
.err-title{font-size:22px;font-weight:600;color:#111;margin-bottom:16px;letter-spacing:-.01em}
.err-desc{font-size:14px;color:#666;line-height:1.7;margin-bottom:32px;max-width:440px}
.err-divider{height:2px;background:#111;width:48px;margin-bottom:32px}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:#111;color:#fff;text-decoration:none;padding:12px 24px;font-size:13px;font-weight:500;letter-spacing:.04em;transition:background .2s}
.btn-home:hover{background:#333}
.btn-home i{font-size:14px}
@media(max-width:640px){.nav{display:none}.main{margin-left:0;padding:24px}.card{padding:36px 28px}.err-code{font-size:72px}}
</style>
</head>
<body>
<div class="layout">
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-title">Зоряна Памʼять</div>
      <div class="nav-logo-sub">Меморіальна платформа</div>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link"><i class="fi fi-rr-home"></i> Головна</a>
      <a href="/#search" class="nav-link"><i class="fi fi-rr-search"></i> Пошук</a>
      <a href="/faq.html" class="nav-link"><i class="fi fi-rr-interrogation"></i> Часті питання</a>
    </div>
    <div class="nav-footer">© Зоряна Памʼять<br>Пам'ятаємо кожного</div>
  </nav>
  <main class="main">
    <div class="card">
      <i class="fi fi-rr-user-slash err-icon"></i>
      <div class="err-code">403</div>
      <div class="err-divider"></div>
      <div class="err-title">Доступ заборонено</div>
      <p class="err-desc">У вас немає прав для перегляду цієї сторінки. Якщо ви вважаєте, що це помилка — увійдіть до свого облікового запису або зверніться до адміністратора.</p>
      <a href="/" class="btn-home"><i class="fi fi-rr-arrow-left"></i> На головну</a>
    </div>
  </main>
</div>
</body>
</html>
